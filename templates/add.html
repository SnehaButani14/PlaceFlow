{% extends "base.html" %}

{% block title %}Add Company - PlaceFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-3 shadow-sm">
            <div class="card-header bg-white border-0 pb-0">
                <h4 class="fw-bold text-dark mb-0">➕ Add New Company</h4>
            </div>
            <div class="card-body">

                <!-- Error/Success Message -->
                <div id="message" class="d-none"></div>

                <!-- Basic Info -->
                <h6 class="text-muted mb-3">Basic Information</h6>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Company Name *</label>
                        <input type="text" id="company_name" 
                               class="form-control" placeholder="e.g. Google">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <input type="text" id="role" 
                               class="form-control" placeholder="e.g. SDE Intern">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">CTC (LPA)</label>
                        <input type="number" id="ctc" 
                               class="form-control" placeholder="e.g. 12.5" step="0.1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Location</label>
                        <input type="text" id="location" 
                               class="form-control" placeholder="e.g. Bangalore">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Status</label>
                        <select id="status" class="form-select">
                            <option value="Applied">Applied</option>
                            <option value="Interview">Interview</option>
                            <option value="Selected">Selected</option>
                            <option value="Rejected">Rejected</option>
                            <option value="Pending">Processing</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Apply Link</label>
                    <input type="url" id="apply_link" 
                           class="form-control" placeholder="https://careers.google.com">
                </div>

                <hr>

                <!-- Eligibility -->
                <h6 class="text-muted mb-3">Eligibility Criteria</h6>
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label">CGPA Criteria</label>
                        <input type="number" id="cgpa_criteria" 
                               class="form-control" placeholder="e.g. 7.0" step="0.1">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">10th % Criteria</label>
                        <input type="number" id="tenth_criteria" 
                               class="form-control" placeholder="e.g. 60">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">12th % Criteria</label>
                        <input type="number" id="twelfth_criteria" 
                               class="form-control" placeholder="e.g. 60">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Backlog Allowed?</label>
                        <select id="backlog_allowed" class="form-select">
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Additional Eligibility Notes</label>
                    <textarea id="eligibility_notes" class="form-control" 
                              rows="2" 
                              placeholder="e.g. No year drop, Diploma students eligible"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Required Skills (comma-separated)</label>
                    <input type="text" id="required_skills" 
                           class="form-control" placeholder="e.g. Python, SQL, React">
                </div>

                <hr>

                <!-- Important Dates -->
                <h6 class="text-muted mb-3">Important Dates</h6>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" id="deadline" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Test Date</label>
                        <input type="date" id="test_date" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Interview Date</label>
                        <input type="date" id="interview_date" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea id="notes" class="form-control" rows="3" 
                              placeholder="Any additional notes..."></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button onclick="submitCompany()" 
                            class="btn btn-primary">
                        ➕ Add Company
                    </button>
                    <a href="/" class="btn btn-outline-secondary">Cancel</a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
